function renderOUTable(game) {
  const periods = [
    { key: '1h', label: '1st Half' },
    { key: '2h', label: '2nd Half' },
    { key: 'full', label: 'Full Game' },
  ];

  let rows = '';
  periods.forEach(({ key, label }) => {
    const line = getPick(game.id, key);
    const side = getSide(game.id, key);
    const actual = calcHalfScore(game, key);
    const complete = isHalfComplete(game, key);
    const inProgress = isHalfInProgress(game, key);
    const { diff, result } = getResult(line, actual, complete, inProgress);

    const showScore = game.state !== 'pre' && (key === 'full' || game.away.linescores.length > (key === '1h' ? 0 : 1));

    let diffHtml = '-';
    let resultHtml = '';

    if (diff !== null && line !== '' && line !== null && line !== undefined) {
      const sign = diff > 0 ? '+' : '';
      const cls = diff > 0 ? 'over' : diff < 0 ? 'under' : 'push';
      diffHtml = `<span class="diff-value ${cls}">${sign}${diff.toFixed(1)}</span>`;
    }

    if (result && result !== 'pending' && line !== '' && line !== null && line !== undefined) {
      const isPacing = result.startsWith('pacing-');
      const baseResult = isPacing ? result.replace('pacing-', '') : result;
      if (side && !isPacing && baseResult !== 'push') {
        const won = side === baseResult;
        const wlLabel = won ? 'WIN' : 'LOSS';
        const wlClass = won ? 'win' : 'loss';
        resultHtml = `<span class="result-badge ${wlClass}">${wlLabel}</span>`;
      } else if (baseResult === 'push') {
        resultHtml = `<span class="result-badge push">PUSH</span>`;
      } else {
        const pacingLabel = isPacing ? `PACING ${baseResult.toUpperCase()}` : baseResult.toUpperCase();
        resultHtml = `<span class="result-badge ${baseResult}">${pacingLabel}</span>`;
      }
    }

    // Lock inputs once the period is complete
    const locked = complete;

    const sideHtml = locked
      ? `<div class="side-toggle locked">
          <button class="side-btn ${side === 'over' ? 'active-over' : ''}" disabled>O</button>
          <button class="side-btn ${side === 'under' ? 'active-under' : ''}" disabled>U</button>
        </div>`
      : `<div class="side-toggle">
          <button class="side-btn ${side === 'over' ? 'active-over' : ''}" data-game="${game.id}" data-period="${key}" data-side="over" onclick="onSideChange(this)">O</button>
          <button class="side-btn ${side === 'under' ? 'active-under' : ''}" data-game="${game.id}" data-period="${key}" data-side="under" onclick="onSideChange(this)">U</button>
        </div>`;

    // Highlight rows that need a bet: 1H/Full when pre-game, 2H/Full at halftime
    const noBet = (line === '' || line === null || line === undefined) || !side;
    const isHalftime = game.statusText === 'Halftime';
    const needsBet = !locked && noBet && (
      (game.state === 'pre') ||
      (key === '1h' && game.state === 'in' && !complete) ||
      (key === '2h' && isHalftime) ||
      (key === 'full' && game.state === 'in' && !complete)
    );

    const rowClass = locked ? 'locked-row' : needsBet ? 'needs-bet' : '';

    rows += `
      <tr${rowClass ? ` class="${rowClass}"` : ''}>
        <td class="period-label">${label}</td>
        <td>${sideHtml}</td>
        <td><input class="ou-input" type="number" step="0.5" value="${line}" placeholder="${key === 'full' && game.vegasOU ? game.vegasOU : '—'}" data-game="${game.id}" data-period="${key}" onblur="onPickChange(this)"${locked ? ' disabled' : ''}></td>
        <td>${showScore ? actual : '-'}</td>
        <td>${diffHtml}</td>
        <td>${resultHtml}</td>
      </tr>`;
  });

  // --- Winner Row ---
  const wp = getWinnerPick(game.id);
  const winnerLocked = game.state === 'post';
  const winnerResult = calcWinnerResult(game, wp);

  let winnerResultHtml = '';
  if (winnerResult.result && winnerResult.result !== 'pending') {
    const isPacing = winnerResult.result.startsWith('pacing-');
    const base = isPacing ? winnerResult.result.replace('pacing-', '') : winnerResult.result;
    if (isPacing) {
      winnerResultHtml = `<span class="result-badge ${base === 'win' ? 'over' : base === 'loss' ? 'under' : 'push'}">PACING ${base.toUpperCase()}</span>`;
    } else if (base === 'win') {
      winnerResultHtml = `<span class="result-badge win">WIN</span>`;
    } else if (base === 'loss') {
      winnerResultHtml = `<span class="result-badge loss">LOSS</span>`;
    } else {
      winnerResultHtml = `<span class="result-badge push">PUSH</span>`;
    }
  }

  let winnerDiffHtml = '-';
  if (winnerResult.diff !== null && hasWinnerBet(game.id)) {
    const sign = winnerResult.diff > 0 ? '+' : '';
    const cls = winnerResult.diff > 0 ? 'over' : winnerResult.diff < 0 ? 'under' : 'push';
    winnerDiffHtml = `<span class="diff-value ${cls}">${sign}${winnerResult.diff.toFixed(1)}</span>`;
  }

  const awayAbbr = game.away.abbreviation || game.away.name.slice(0, 3).toUpperCase();
  const homeAbbr = game.home.abbreviation || game.home.name.slice(0, 3).toUpperCase();

  // Parse ESPN spread to get a default value
  let defaultSpread = '';
  if (game.spread) {
    const spreadMatch = game.spread.match(/([-+]?\d+\.?\d*)/);
    if (spreadMatch) defaultSpread = spreadMatch[1];
  }

  const teamPickHtml = winnerLocked
    ? `<div class="team-pick-toggle locked">
        <button class="team-pick-btn ${wp.team === 'away' ? 'active' : ''}" disabled>${awayAbbr}</button>
        <button class="team-pick-btn ${wp.team === 'home' ? 'active' : ''}" disabled>${homeAbbr}</button>
      </div>`
    : `<div class="team-pick-toggle">
        <button class="team-pick-btn ${wp.team === 'away' ? 'active' : ''}" onclick="onWinnerTeamChange('${game.id}', 'away', this)">${awayAbbr}</button>
        <button class="team-pick-btn ${wp.team === 'home' ? 'active' : ''}" onclick="onWinnerTeamChange('${game.id}', 'home', this)">${homeAbbr}</button>
      </div>`;

  const typeToggleHtml = winnerLocked
    ? `<div class="winner-type-toggle locked">
        <button class="type-btn ${wp.type === 'spread' ? 'active' : ''}" disabled>SPR</button>
        <button class="type-btn ${wp.type === 'ml' ? 'active' : ''}" disabled>ML</button>
      </div>`
    : `<div class="winner-type-toggle">
        <button class="type-btn ${wp.type !== 'ml' ? 'active' : ''}" onclick="onWinnerTypeChange('${game.id}', 'spread', this)">SPR</button>
        <button class="type-btn ${wp.type === 'ml' ? 'active' : ''}" onclick="onWinnerTypeChange('${game.id}', 'ml', this)">ML</button>
      </div>`;

  const spreadInputHtml = wp.type === 'ml'
    ? `<span style="font-size:0.72rem;color:var(--text-muted);font-style:italic;">—</span>`
    : `<input class="ou-input" type="number" step="0.5" value="${wp.spread}" placeholder="${defaultSpread || '—'}" data-game="${game.id}" onblur="onWinnerSpreadChange(this)"${winnerLocked ? ' disabled' : ''}>`;

  const winnerScore = game.state !== 'pre' && wp.team ? `${game[wp.team]?.score ?? '-'}` : '-';

  const winnerRowClass = winnerLocked ? 'locked-row' : '';

  rows += `
    <tr class="winner-separator"><td colspan="6"></td></tr>
    <tr${winnerRowClass ? ` class="${winnerRowClass}"` : ''}>
      <td class="period-label">Winner</td>
      <td>${teamPickHtml}</td>
      <td>
        <div class="winner-input-group">
          ${typeToggleHtml}
          ${spreadInputHtml}
        </div>
      </td>
      <td>${winnerScore}</td>
      <td>${winnerDiffHtml}</td>
      <td>${winnerResultHtml}</td>
    </tr>`;

  const vegasHint = game.vegasOU ? `<div class="vegas-hint">Vegas O/U: ${game.vegasOU}${game.spread ? ` | Spread: ${game.spread}` : ''}</div>` : '';

  return `
    <table class="ou-table">
      <thead>
        <tr>
          <th>Period</th>
          <th>Bet</th>
          <th>Your Line</th>
          <th>Actual</th>
          <th>Diff</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    ${vegasHint}`;
}

// --- Tracker View ---
// Determine which period to show for a game (one at a time, with swap logic)
function getActivePeriod(game) {
  // Pre-game: show full game bet if exists, else 1h
  if (game.state === 'pre') {
    if (hasBet(game.id, 'full')) return 'full';
    if (hasBet(game.id, '1h')) return '1h';
    if (hasBet(game.id, '2h')) return '2h';
    return 'full';
  }

  // 1st half in progress
  if (game.state === 'in' && game.period === 1) {
    // Check clock — if under 3:00, swap to show 2H preview if bet exists
    const clockParts = (game.clock || '').split(':');
    const minutes = parseInt(clockParts[0]) || 0;
    if (minutes < 3 && hasBet(game.id, '2h')) return '2h';
    if (hasBet(game.id, '1h')) return '1h';
    if (hasBet(game.id, 'full')) return 'full';
    return '1h';
  }

  // 2nd half / OT in progress
  if (game.state === 'in' && game.period >= 2) {
    if (hasBet(game.id, '2h')) return '2h';
    if (hasBet(game.id, 'full')) return 'full';
    return '2h';
  }

  // Final: show full game
  if (game.state === 'post') {
    if (hasBet(game.id, 'full')) return 'full';
    if (hasBet(game.id, '2h')) return '2h';
    if (hasBet(game.id, '1h')) return '1h';
    return 'full';
  }

  return 'full';
}

function hasBet(gameId, period) {
  const line = getPick(gameId, period);
  return line !== '' && line !== null && line !== undefined;
}

function renderSlider(score, line, side, result, gameId, startFrom, isWin, isLoss, periodKey) {
  if (line === '' || line === null || line === undefined) return '';

  const lineNum = parseFloat(line);
  const lineTarget = Math.ceil(lineNum); // whole number needed to clear
  const start = startFrom || 0;
  const range = lineTarget - start;
  const progress = score - start;

  const pct = range > 0 ? Math.min((progress / range) * 100, 100) : (score >= lineNum ? 100 : 0);
  const isOver = score > lineNum;
  const isAt = score === lineNum;

  let fillClass = 'under-line';
  if (isAt) fillClass = 'at-line';
  else if (isOver) {
    if (isWin) fillClass = 'over-line-win';
    else if (isLoss) fillClass = 'over-line-loss';
    else fillClass = 'over-line-neutral';
  }

  // When over/at the line, ball grows big and pushes to far right
  const hitLine = isOver || isAt;
  const ballPct = hitLine ? 100 : Math.min(pct, 95);
  const ballOverClass = hitLine ? ' ball-over' : '';
  const scoreOverClass = hitLine ? ' score-over' : '';

  const rawDiff = score - lineNum;
  // Round to whole points: under=-6 means need 6 pts, over=+1 means 1 pt clear
  const diff = rawDiff < 0 ? -Math.ceil(Math.abs(rawDiff)) : (rawDiff > 0 ? Math.ceil(rawDiff) : 0);
  const sign = diff > 0 ? '+' : '';
  const diffClass = diff > 0 ? 'over' : diff < 0 ? 'under' : 'push';

  const crownHtml = isWin ? `<div class="slider-crown">👑</div>` : '';

  // Diff is white until settled (win=green, loss=red)
  let diffColorClass = '';
  if (isWin) diffColorClass = 'over';
  else if (isLoss) diffColorClass = 'under';

  const uid = gameId ? `${gameId}_${periodKey || 'full'}` : '';

  return `
    <div class="slider-track" data-game-id="${uid}">
      <div class="slider-fill ${fillClass}" style="width:${pct}%"></div>
      <div class="slider-ball${ballOverClass}" style="left:${ballPct}%">🏀</div>
      <div class="slider-score-inside${scoreOverClass}" style="left:${ballPct}%">${score}</div>
      ${crownHtml}
    </div>
    <div class="tracker-bar-info">
      <span class="tracker-bar-score">${start}</span>
      <span class="tracker-bar-diff diff-value ${diffColorClass}">${sign}${diff}</span>
      <span class="tracker-bar-line-num"${hitLine ? ' style="visibility:hidden"' : ''}>${Math.ceil(lineNum)}</span>
    </div>`;
}

function renderSpreadMeter(game, wp, diff, isWin, isLoss2) {
  if (!wp || !wp.team) return '';
  const pickedSide = wp.team;
  const otherSide = pickedSide === 'away' ? 'home' : 'away';
  const pickedAbbr = game[pickedSide].abbreviation || game[pickedSide].name.slice(0, 3).toUpperCase();
  const isMl = wp.type === 'ml';
  const spread = isMl ? 0 : (parseFloat(wp.spread) || 0);

  // adjustedDiff: positive = covering, negative = not covering
  const adjustedDiff = diff !== null ? diff : 0;
  // Map to a percentage: 0 = exactly on the line, 50% each side. Cap at ±15 pts
  const maxRange = 15;
  const clamped = Math.max(-maxRange, Math.min(maxRange, adjustedDiff));
  const pct = 50 + (clamped / maxRange) * 50;

  const diffSign = adjustedDiff > 0 ? '+' : '';
  const diffRound = adjustedDiff !== 0 ? Math.round(adjustedDiff * 10) / 10 : 0;

  // Fill from center: left = red (not covering), right = green (covering)
  const fillPct = Math.abs(clamped) / maxRange * 50; // 0-50%
  let fillHtml = '';
  if (adjustedDiff < 0) {
    // Red on left side of center
    const color = isLoss2 ? 'rgba(239,68,68,0.5)' : 'rgba(239,68,68,0.3)';
    fillHtml = `<div class="spread-meter-fill-left" style="width:${fillPct}%;background:${color};"></div>`;
  } else if (adjustedDiff > 0) {
    // Green on right side of center
    const color = isWin ? 'rgba(34,197,94,0.5)' : 'rgba(34,197,94,0.3)';
    fillHtml = `<div class="spread-meter-fill-right" style="width:${fillPct}%;background:${color};"></div>`;
  }

  return `
    <div class="spread-meter">
      <div class="spread-meter-track">
        <div class="spread-meter-center"></div>
        ${fillHtml}
        <div class="spread-meter-ball" style="left:${pct}%">${diffSign}${diffRound}</div>
      </div>
    </div>`;
}

function renderTracker(games) {
  let totalWins = 0, totalLosses = 0, totalPushes = 0, totalInProgress = 0, totalPending = 0;

  games.forEach(game => {
    ['1h', '2h', 'full'].forEach(period => {
      const line = getPick(game.id, period);
      const side = getSide(game.id, period);
      if (line === '' || line === null || line === undefined || !side) return;
      const actual = calcHalfScore(game, period);
      const complete = isHalfComplete(game, period);
      const inProgress = isHalfInProgress(game, period);
      if (!complete && !inProgress) { totalPending++; return; }
      const { result } = getResult(line, actual, complete, inProgress);
      // Under bet busted live = instant loss
      if (side === 'under' && result === 'pacing-over') { totalLosses++; return; }
      // Over bet winning live = instant win
      if (side === 'over' && result === 'pacing-over') { totalWins++; return; }
      if (!complete && inProgress) { totalInProgress++; return; }
      if (result === 'push') totalPushes++;
      else if (result === side) totalWins++;
      else totalLosses++;
    });

    // Count winner bets
    if (hasWinnerBet(game.id)) {
      const wp = getWinnerPick(game.id);
      const wResult = calcWinnerResult(game, wp);
      if (wResult.result === 'win') totalWins++;
      else if (wResult.result === 'loss') totalLosses++;
      else if (wResult.result === 'push') totalPushes++;
      else if (wResult.result === 'pacing-win') totalWins++;
      else if (wResult.result === 'pacing-loss') totalLosses++;
      else if (wResult.result && wResult.result !== 'pending') totalInProgress++;
      else totalPending++;
    }
  });

  const allBetted = games.filter(game => ['1h', '2h', 'full'].some(p => hasBet(game.id, p)) || hasWinnerBet(game.id));

  if (!allBetted.length) {
    document.getElementById('gamesList').innerHTML = `<div class="no-games"><h3>No bets entered</h3><p>Go to "Input" view to enter your lines and pick O/U.</p></div>`;
    return;
  }

  let cardsHtml = '';

  // Build individual bet entries (one per period per game)
  const now = Date.now();
  const activeBets = [];
  const settledBets = [];

  allBetted.forEach(game => {
    ['1h', '2h', 'full'].forEach(period => {
      if (!hasBet(game.id, period)) return;
      const line = getPick(game.id, period);
      const side = getSide(game.id, period);
      if (!side) return;

      const actual = calcHalfScore(game, period);
      const complete = isHalfComplete(game, period);
      const inProgress = isHalfInProgress(game, period);
      const { diff, result } = getResult(line, actual, complete, inProgress);
      // Under bets are instantly settled when score crosses the line (can't come back)
      const isPacingBust = side === 'under' && result === 'pacing-over';
      const isSettled = isPacingBust || (complete && result && result !== 'pending' && !result.startsWith('pacing-'));

      const entry = { game, period, line, side, actual, complete, inProgress, diff, result, isSettled };

      if (isSettled) {
        const winKey = `${game.id}_${period}_settled`;
        if (!winTimestamps[winKey]) winTimestamps[winKey] = now;
        const elapsed = now - winTimestamps[winKey];
        if (elapsed < 60000) activeBets.push(entry);
        else settledBets.push(entry);
      } else {
        activeBets.push(entry);
      }
    });

    // Winner bet
    if (hasWinnerBet(game.id)) {
      const wp = getWinnerPick(game.id);
      const wResult = calcWinnerResult(game, wp);
      const complete = game.state === 'post';
      const inProgress = game.state === 'in';
      const isSettled = complete && wResult.result && wResult.result !== 'pending' && !wResult.result.startsWith('pacing-');
      const entry = {
        game, period: 'winner', line: wp.type === 'ml' ? 'ML' : wp.spread,
        side: wp.team, actual: game[wp.team]?.score || 0,
        complete, inProgress, diff: wResult.diff, result: wResult.result, isSettled,
        isWinnerBet: true, winnerPick: wp,
      };
      if (isSettled) {
        const winKey = `${game.id}_winner_settled`;
        if (!winTimestamps[winKey]) winTimestamps[winKey] = now;
        const elapsed = now - winTimestamps[winKey];
        if (elapsed < 60000) activeBets.push(entry);
        else settledBets.push(entry);
      } else {
        activeBets.push(entry);
      }
    }
  });

  // Sort active bets: live closest to line first, then pre-game
  activeBets.sort((a, b) => {
    const aLive = a.game.state === 'in' ? 0 : a.game.state === 'post' ? 1 : 2;
    const bLive = b.game.state === 'in' ? 0 : b.game.state === 'post' ? 1 : 2;
    if (aLive !== bLive) return aLive - bLive;
    if (a.game.state === 'in' && b.game.state === 'in') {
      const aLine = parseFloat(a.line) || 999;
      const bLine = parseFloat(b.line) || 999;
      const aPct = a.actual / aLine;
      const bPct = b.actual / bLine;
      return bPct - aPct;
    }
    return 0;
  });

  function renderBetCard(entry, isSettledSection) {
    const { game, period, line, side, actual, complete, inProgress, diff, result } = entry;
    const isLive = game.state === 'in';
    const isFinal = game.state === 'post';
    const isHalftime = game.statusText === 'Halftime';
    const statusClass = isHalftime ? 'halftime' : isLive ? 'live' : isFinal ? 'final' : 'pre';

    const genderBadge = currentGender === 'both' && game.gender
      ? `<span class="tracker-gender-badge" style="background:${game.gender === 'mens' ? 'rgba(59,130,246,0.2)' : 'rgba(236,72,153,0.2)'};color:${game.gender === 'mens' ? '#60a5fa' : '#f472b6'}">${game.gender === 'mens' ? 'M' : 'W'}</span>`
      : '';

    const isWinnerBet = entry.isWinnerBet;
    const periodLabel = isWinnerBet ? 'WINNER' : period === '1h' ? '1ST HALF' : period === '2h' ? '2ND HALF' : 'FULL GAME';
    const showScore = game.state !== 'pre' && (isWinnerBet || period === 'full' || game.away.linescores.length > (period === '1h' ? 0 : 1));
    const scoreToShow = showScore ? actual : 0;

    let sideLabel, sideClass;
    if (isWinnerBet) {
      const wp = entry.winnerPick;
      const teamAbbr = game[wp.team]?.abbreviation || game[wp.team]?.name?.slice(0,3).toUpperCase() || wp.team;
      sideLabel = wp.type === 'ml' ? `${teamAbbr} ML` : `${teamAbbr} ${wp.spread > 0 ? '+' : ''}${wp.spread}`;
      sideClass = 'winner';
    } else {
      sideLabel = side === 'over' ? 'OVER' : 'UNDER';
      sideClass = side;
    }

    // Token
    let tokenHtml = '';
    if (result && result !== 'pending') {
      const isPacing = result.startsWith('pacing-');
      const baseResult = isPacing ? result.replace('pacing-', '') : result;
      if (isPacing) tokenHtml = `<span class="tracker-token live">LIVE</span>`;
      else if (baseResult === 'push') tokenHtml = `<span class="tracker-token push">PUSH</span>`;
      else if (isWinnerBet) {
        tokenHtml = baseResult === 'win'
          ? `<span class="tracker-token win">WIN</span>`
          : `<span class="tracker-token loss">LOSS</span>`;
      } else {
        tokenHtml = side === baseResult
          ? `<span class="tracker-token win">WIN</span>`
          : `<span class="tracker-token loss">LOSS</span>`;
      }
    } else if (game.state === 'pre') {
      tokenHtml = `<span class="tracker-token pending">PRE</span>`;
    }

    let isWin, isLoss2;
    if (isWinnerBet) {
      // Winner bets only settle on final — score can swing during live play
      isWin = result === 'win';
      isLoss2 = result === 'loss';
    } else {
      const isSettledWin = result && !result.startsWith('pacing-') && result !== 'pending' && result !== 'push' && side === result;
      const isPacingWin = side === 'over' && result === 'pacing-over';
      isWin = isSettledWin || isPacingWin;
      const isSettledLoss = result && !result.startsWith('pacing-') && result !== 'pending' && result !== 'push' && side !== result;
      const isPacingLoss = side === 'under' && result === 'pacing-over';
      isLoss2 = isSettledLoss || isPacingLoss;
    }
    const dateLabel = currentDateMode !== 'single'
      ? `<span style="font-size:0.6rem;color:var(--text-muted)">${formatDateDisplay(new Date(game.date))}</span>`
      : '';

    // Nervous when live, not yet won or lost, and score is close to the line (O/U bets only)
    const lineNum = parseFloat(line) || 0;
    const absDiff = Math.abs(actual - lineNum);
    const isNervous = !isWinnerBet && inProgress && !complete && !isWin && !isLoss2 && absDiff <= 8;
    const isVeryNervous = isNervous && absDiff <= 4;
    const isPanic = isNervous && absDiff <= 1;

    const cardClasses = [
      'tracker-card',
      isLive ? 'is-live' : '',
      isWin ? 'win-card' : '',
      isSettledSection ? 'settled-card' : '',
      isSettledSection && isWin ? 'settled-win' : '',
      isSettledSection && isLoss2 ? 'settled-loss' : '',
      isSettledSection && !isWin && !isLoss2 ? 'settled-push' : '',
      isPanic ? 'panic' : isVeryNervous ? 'very-nervous' : isNervous ? 'nervous' : '',
    ].filter(Boolean).join(' ');

    const cardId = `${game.id}_${period}`;
    let html = `<div class="${cardClasses}" data-game-id="${cardId}">`;
    if (isWin && !isSettledSection) {
      html += `<div class="fireworks-container" id="fw-${cardId}"></div>`;
    }
    if (isLoss2 && !isSettledSection) {
      html += `<div class="loser-stamp">LOSER</div>`;
    }

    const currentDelay = gameDelays[game.id] || 0;
    const delayHtml = (isLive && !isSettledSection) ? `<div class="delay-control">
      <button class="delay-btn" onclick="adjustDelay('${game.id}', -5)">−</button>
      <span class="delay-value">${currentDelay > 0 ? currentDelay + 's' : '⏱'}</span>
      <button class="delay-btn" onclick="adjustDelay('${game.id}', 5)">+</button>
    </div>` : '';

    if (isSettledSection) {
      // Compact settled card: single row with key info
      const diffVal = isWinnerBet ? (diff || 0) : actual - parseFloat(line);
      const diffSign = diffVal > 0 ? '+' : '';
      const diffRounded = diffVal < 0 ? -Math.ceil(Math.abs(diffVal)) : (diffVal > 0 ? Math.ceil(diffVal) : 0);
      const resultClass = isWin ? 'over' : isLoss2 ? 'under' : 'push';
      const resultLabel = isWin ? 'WIN' : isLoss2 ? 'LOSS' : 'PUSH';

      const settledPeriodHtml = isWinnerBet ? 'WIN<br>NER' : period === '1h' ? '1ST<br>HALF' : period === '2h' ? '2ND<br>HALF' : 'FULL<br>GAME';

      html += `<div class="settled-compact">
        <div class="settled-period-vert">${settledPeriodHtml}</div>
        <div class="settled-team-col">
          ${game.away.logo ? `<img class="settled-logo" src="${game.away.logo}" alt="" onerror="this.style.display='none'">` : ''}
          <span class="settled-abbr">${game.away.abbreviation || game.away.name.slice(0,3).toUpperCase()}</span>
        </div>
        <span class="tracker-bet-tag ${sideClass}${isWin ? ' won' : ''}${isLoss2 ? ' lost' : ''}">${isWinnerBet ? sideLabel : sideLabel + ' ' + line}</span>
        <div class="settled-team-col">
          ${game.home.logo ? `<img class="settled-logo" src="${game.home.logo}" alt="" onerror="this.style.display='none'">` : ''}
          <span class="settled-abbr">${game.home.abbreviation || game.home.name.slice(0,3).toUpperCase()}</span>
        </div>
        <span class="settled-score">${actual}</span>
        <span class="diff-value ${resultClass}">${diffSign}${diffRounded}</span>
      </div>`;

      html += `<div class="tracker-ou-section" id="tracker-ou-${game.id}-${period}" style="display:none;">
        ${renderOUTable(game)}
      </div>`;

      html += `<div class="tracker-chevron" onclick="toggleTrackerInput(this)">
        <span class="tracker-chevron-icon">▼</span>
      </div>`;
    } else {
      html += `<div class="tracker-status-row">
        <div class="tracker-status-left">
          ${genderBadge}
          <span class="tracker-period-label">${periodLabel}</span>
          <span class="tracker-status ${statusClass}">${complete ? '' : (isLive ? '● ' : '') + game.statusText}</span>
          ${dateLabel}
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          ${delayHtml}
          ${tokenHtml}
        </div>
      </div>`;

      // Slider start: 1H=0, Full=0, 2H=first half score
      const sliderStart = isWinnerBet ? 0 : (period === '2h' ? getFirstHalfScore(game) : 0);

      // Scale logos on winner bet cards only — based on adjusted spread diff, not raw score
      // Scale logos on winner bet cards — use width/height so layout adjusts
      const baseLogoSize = 36;
      let awayLogoSize = baseLogoSize, homeLogoSize = baseLogoSize;
      if (isWinnerBet && game.state !== 'pre' && diff !== null) {
        const wp = entry.winnerPick;
        const coverLead = Math.abs(diff);
        const scaledSize = Math.round(baseLogoSize * (1 + Math.min(coverLead, 20) * 0.1));
        if (diff > 0) {
          if (wp.team === 'away') awayLogoSize = scaledSize;
          else homeLogoSize = scaledSize;
        } else if (diff < 0) {
          if (wp.team === 'away') homeLogoSize = scaledSize;
          else awayLogoSize = scaledSize;
        }
      }
      const awayLogoStyle = awayLogoSize !== baseLogoSize ? `style="width:${awayLogoSize}px;height:${awayLogoSize}px;transition:all 0.5s ease;"` : '';
      const homeLogoStyle = homeLogoSize !== baseLogoSize ? `style="width:${homeLogoSize}px;height:${homeLogoSize}px;transition:all 0.5s ease;"` : '';

      html += `<div class="tracker-bar-row">
        <div class="tracker-team-side">
          ${game.away.logo ? `<img src="${game.away.logo}" alt="" onerror="this.style.display='none'" ${awayLogoStyle}>` : ''}
          <span class="t-name">${game.away.abbreviation || game.away.name}</span>
          ${game.state !== 'pre' ? `<span class="t-score">${game.away.score}</span>` : ''}
        </div>
        <div class="tracker-bar-center">
          <div class="tracker-bet-line"><span class="tracker-bet-tag ${sideClass}${isWin ? ' won' : ''}${isLoss2 ? ' lost' : ''}">${isWinnerBet ? sideLabel : sideLabel + ' ' + line}</span></div>
          ${!showScore
            ? `<div style="font-size:0.72rem;color:var(--text-muted);font-style:italic;text-align:center;padding:8px 0;">Waiting for tip-off</div>`
            : isWinnerBet
              ? renderSpreadMeter(game, entry.winnerPick, diff, isWin, isLoss2)
              : renderSlider(scoreToShow, line, side, result, game.id, sliderStart, isWin, isLoss2, period)
          }
        </div>
        <div class="tracker-team-side">
          ${game.home.logo ? `<img src="${game.home.logo}" alt="" onerror="this.style.display='none'" ${homeLogoStyle}>` : ''}
          <span class="t-name">${game.home.abbreviation || game.home.name}</span>
          ${game.state !== 'pre' ? `<span class="t-score">${game.home.score}</span>` : ''}
        </div>
      </div>`;

      html += `<div class="tracker-ou-section" id="tracker-ou-${game.id}-${period}" style="display:none;">
        ${renderOUTable(game)}
      </div>`;

      html += `<div class="tracker-chevron" onclick="toggleTrackerInput(this)">
        <span class="tracker-chevron-icon">▼</span>
      </div>`;
    }

    html += `</div>`;
    return html;
  }

  activeBets.forEach(entry => { cardsHtml += renderBetCard(entry, false); });

  // Settled bets section (pushed down after 1 min)
  if (settledBets.length) {
    cardsHtml += `<div style="font-size:0.72rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:12px 0 6px;margin-top:8px;">Settled</div>`;
    settledBets.forEach(entry => { cardsHtml += renderBetCard(entry, true); });
  }

  document.getElementById('gamesList').innerHTML = `
    <div class="tracker-layout">
      <div class="tracker-side-counter wins">
        <div class="counter-num">${totalWins}</div>
        <div class="counter-label">Wins</div>
      </div>
      <div class="tracker-cards-center">${cardsHtml}</div>
      <div class="tracker-side-counter losses">
        <div class="counter-num">${totalLosses}</div>
        <div class="counter-label">Losses</div>
      </div>
    </div>`;

  // Flash detection: compare current scores to previous and trigger animation
  const newScores = {};
  games.forEach(game => {
    const total = game.away.score + game.home.score;
    newScores[game.id] = total;
  });

  // Find games where score changed and trigger flash on ALL sliders for that game
  Object.keys(newScores).forEach(gameId => {
    if (prevScores[gameId] !== undefined && prevScores[gameId] !== newScores[gameId]) {
      document.querySelectorAll(`.slider-track[data-game-id^="${gameId}_"]`).forEach(track => {
        track.classList.remove('flash');
        void track.offsetWidth;
        track.classList.add('flash');
      });
    }
  });

  prevScores = newScores;

  // Spawn fireworks on win cards
  document.querySelectorAll('.fireworks-container').forEach(container => {
    if (!container.dataset.spawned) {
      container.dataset.spawned = 'true';
      spawnFireworks(container);
    }
  });

  // Play air horn / loss sound at the right moment:
  // OVER bets: horn plays instantly when live score crosses the line (pacing-over)
  // UNDER bets: horn plays only when the period settles (final) with score under
  [...activeBets, ...settledBets].forEach(entry => {
    const { game, period, side, result, complete } = entry;
    const settleKey = `${game.id}_${period}`;

    // Over bet: fire when score first crosses the line (pacing or settled)
    if (side === 'over' && !prevSettled[settleKey]) {
      const hitOver = result === 'pacing-over' || (complete && result === 'over');
      if (hitOver) {
        playAirHorn();
        setTimeout(() => showTipPopup(), 3000);
        prevSettled[settleKey] = true;
      }
    }

    // Under bet: loss plays instantly when score crosses line, win only at period end
    if (side === 'under' && !prevSettled[settleKey]) {
      if (result === 'pacing-over') {
        // Busted - score went over the line during live play
        playLossSound();
        prevSettled[settleKey] = true;
      } else if (complete && result === 'under') {
        playAirHorn();
        setTimeout(() => showTipPopup(), 3000);
        prevSettled[settleKey] = true;
      } else if (complete && result === 'over') {
        playLossSound();
        prevSettled[settleKey] = true;
      }
    }

    // Over bet loss: only when settled
    if (side === 'over' && !prevSettled[settleKey] && complete) {
      if (result === 'under') {
        playLossSound();
        prevSettled[settleKey] = true;
      }
    }

    // Winner bets: horn on win, loss sound on loss (only at settlement)
    if (entry.isWinnerBet && !prevSettled[settleKey] && complete) {
      if (result === 'win') {
        playAirHorn();
        setTimeout(() => showTipPopup(), 3000);
        prevSettled[settleKey] = true;
      } else if (result === 'loss') {
        playLossSound();
        prevSettled[settleKey] = true;
      }
    }

    // Push
    if (complete && (result === 'push') && !prevSettled[settleKey]) {
      prevSettled[settleKey] = true;
    }
  });

  // Persist to localStorage so page reloads don't re-trigger celebrations
  localStorage.setItem('mm_prevSettled', JSON.stringify(prevSettled));
  localStorage.setItem('mm_winTimestamps', JSON.stringify(winTimestamps));
}

let prevSettled = JSON.parse(localStorage.getItem('mm_prevSettled') || '{}');

function spawnFireworks(container) {
  const colors = ['#22c55e', '#f97316', '#eab308', '#3b82f6', '#ef4444', '#a855f7', '#ec4899'];
  const rect = container.getBoundingClientRect();
  const w = container.offsetWidth;
  const h = container.offsetHeight;

  function burst() {
    const cx = Math.random() * w;
    const cy = Math.random() * h * 0.6;
    const count = 12 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      particle.className = 'firework-particle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
      const dist = 30 + Math.random() * 50;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 2 + Math.random() * 3;
      particle.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${color};animation-duration:${0.6 + Math.random() * 0.6}s;--dx:${dx}px;--dy:${dy}px;`;
      particle.style.animation = 'none';
      container.appendChild(particle);

      // Animate with transform
      requestAnimationFrame(() => {
        particle.style.transition = `all ${0.6 + Math.random() * 0.6}s ease-out`;
        particle.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
        particle.style.opacity = '0';
      });

      setTimeout(() => particle.remove(), 1500);
    }
  }

  // Multiple bursts
  burst();
  setTimeout(burst, 300);
  setTimeout(burst, 600);
  setTimeout(burst, 1000);
  // Repeat every 3 seconds
  setInterval(() => {
    burst();
    setTimeout(burst, 300);
  }, 3500);
}

function playAirHorn() {
  // Generate air horn sound using Web Audio API
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function makeOsc(freq, startTime, duration, gain) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, startTime);
      osc.frequency.linearRampToValueAtTime(freq * 1.02, startTime + duration);
      g.gain.setValueAtTime(gain, startTime);
      g.gain.setValueAtTime(gain, startTime + duration * 0.7);
      g.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    const now = ctx.currentTime;
    // Classic air horn: layered sawtooth waves
    makeOsc(240, now, 0.8, 0.15);
    makeOsc(480, now, 0.8, 0.1);
    makeOsc(360, now, 0.8, 0.08);
    makeOsc(240, now + 0.15, 0.65, 0.12);
    makeOsc(600, now + 0.1, 0.5, 0.05);
  } catch(e) {
    console.log('Audio not available');
  }
}

let tipDismissTimer = null;

function dismissTip(el) {

}

// --- Game Notifications ---
const shownNotifications = new Set();
let notifyQueue = [];
let notifyActive = false;
const halftimeStartTimes = {};

function checkGameNotifications(games) {
  const now = Date.now();

  games.forEach(game => {
    // 5 minutes before 1H tipoff
    if (game.state === 'pre') {
      const tipoff = new Date(game.date).getTime();
      const minsUntil = (tipoff - now) / 60000;
      const key = `${game.id}_1h_pre`;
      if (minsUntil > 0 && minsUntil <= 5 && !shownNotifications.has(key)) {
        shownNotifications.add(key);
        const unbetted = [];
        if (!hasBet(game.id, '1h')) unbetted.push('1H');
        if (!hasBet(game.id, '2h')) unbetted.push('2H');
        if (!hasBet(game.id, 'full')) unbetted.push('Full');
        const warnHtml = unbetted.length
          ? `<div class="game-notify-warn">⚠ No bet placed: ${unbetted.join(', ')}</div>`
          : '';
        queueNotify(`🏀`, `Tipoff in ${Math.ceil(minsUntil)} min`,
          `${game.away.name} vs ${game.home.name}`, warnHtml, game);
      }
    }

    // Track when halftime starts, notify 5 min after
    if (game.statusText === 'Halftime') {
      if (!halftimeStartTimes[game.id]) halftimeStartTimes[game.id] = now;
    }
    const htStart = halftimeStartTimes[game.id];
    if (htStart && (game.statusText === 'Halftime') && (now - htStart >= 300000)) {
      const key = `${game.id}_2h_half`;
      if (!shownNotifications.has(key)) {
        shownNotifications.add(key);
        const unbetted = [];
        if (!hasBet(game.id, '2h')) unbetted.push('2H');
        if (!hasBet(game.id, 'full') && !isHalfComplete(game, 'full')) unbetted.push('Full');
        const warnHtml = unbetted.length
          ? `<div class="game-notify-warn">⚠ No bet placed: ${unbetted.join(', ')}</div>`
          : '';
        queueNotify(`⏸️`, `2H Starting Soon`,
          `${game.away.name} vs ${game.home.name}`, warnHtml, game);
      }
    }
  });
}

function queueNotify(icon, title, body, extraHtml, game) {
  notifyQueue.push({ icon, title, body, extraHtml, game });
  if (!notifyActive) showNextNotify();
}

function showNextNotify() {
  if (!notifyQueue.length) { notifyActive = false; return; }
  notifyActive = true;
  const { icon, title, body, extraHtml, game } = notifyQueue.shift();

  const gameInputHtml = game ? `<div class="game-notify-inputs">${renderOUTable(game)}</div>` : '';

  const el = document.createElement('div');
  el.className = 'game-notify';
  el.innerHTML = `
    <button class="game-notify-x" onclick="peekGameNotify(this)">✕</button>
    <div class="game-notify-icon">${icon}</div>
    <div class="game-notify-title">${title}</div>
    <div class="game-notify-body">${body}</div>
    ${extraHtml || ''}
    ${gameInputHtml}
    <span class="game-notify-peek-tab">🏀</span>
  `;
  document.body.appendChild(el);

  // Click handler for peeking state — reopen
  el.addEventListener('click', function(e) {
    if (el.classList.contains('peeking') && !e.target.closest('.game-notify-x')) {
      el.classList.remove('peeking');
      el.classList.add('visible');
    }
  });

  requestAnimationFrame(() => {
    requestAnimationFrame(() => el.classList.add('visible'));
  });

  setTimeout(() => peekGameNotify(el), 15000);
}

function peekGameNotify(el) {
  const notify = el.closest ? el.closest('.game-notify') : el;
  if (!notify || !notify.parentNode) return;
  if (notify.classList.contains('peeking')) return;
  notify.classList.remove('visible');
  notify.classList.add('peeking');
  // Let next notification show
  if (notifyActive) {
    notifyActive = false;
    showNextNotify();
  }
}

function dismissGameNotify(el) {
  const notify = el.closest ? el.closest('.game-notify') : el;
  if (!notify || !notify.parentNode || notify.classList.contains('dismissing')) return;
  notify.classList.add('dismissing');
  notify.classList.remove('visible', 'peeking');
  setTimeout(() => {
    if (notify.parentNode) notify.remove();
  }, 400);
}

function playLossSound() {
  // Sad descending trombone: wah wah wah wahhh
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    function sadNote(startFreq, endFreq, startTime, duration, vol) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(startFreq, startTime);
      osc.frequency.linearRampToValueAtTime(endFreq, startTime + duration);
      g.gain.setValueAtTime(vol, startTime);
      g.gain.setValueAtTime(vol * 0.8, startTime + duration * 0.8);
      g.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    // Wah wah wah wahhhhh
    sadNote(392, 380, now, 0.3, 0.15);        // G
    sadNote(349, 340, now + 0.35, 0.3, 0.15);  // F
    sadNote(330, 320, now + 0.7, 0.3, 0.15);   // E
    sadNote(311, 260, now + 1.05, 0.8, 0.18);  // Eb slides down low
  } catch(e) {
    console.log('Audio not available');
  }
}

document.addEventListener('click', (e) => {
  const avatarMenu = document.getElementById('avatarMenu');
  if (avatarMenu && !e.target.closest('.avatar-menu-wrapper')) {
    avatarMenu.classList.remove('open');
  }
  const datePicker = document.getElementById('datePickerDropdown');
  if (datePicker && !e.target.closest('.date-picker-wrapper')) {
    datePicker.classList.remove('open');
  }
});

function toggleGame(id) {
  const card = document.querySelector(`.game-card[data-id="${id}"]`);
  if (card) card.classList.toggle('expanded');
}

function findGame(gameId) {
  for (const games of Object.values(gamesData)) {
    const g = games.find(g => g.id === gameId);
    if (g) return g;
  }
  for (const games of Object.values(allGamesCache)) {
    const g = games.find(g => g.id === gameId);
    if (g) return g;
  }
  return null;
}

function reRenderGameCard(gameId, focusPeriod) {
  const game = findGame(gameId);
  if (game) {
    const card = document.querySelector(`.game-card[data-id="${gameId}"]`);
    if (card) {
      const section = card.querySelector('.ou-section');
      section.innerHTML = renderOUTable(game);
      if (focusPeriod) {
        const newInput = section.querySelector(`input[data-period="${focusPeriod}"]`);
        if (newInput) newInput.focus();
      }
    }
  }
  renderSummary(getAllCachedGames());
}

function onPickChange(input) {
  const gameId = input.dataset.game;
  const period = input.dataset.period;
  savePick(gameId, period, input.value);
  if (currentTab === 'tracker') {
    refresh();
  } else {
    renderSummary(getAllCachedGames());
  }
}

function onSideChange(btn) {
  const gameId = btn.dataset.game;
  const period = btn.dataset.period;
  const side = btn.dataset.side;
  const currentSide = getSide(gameId, period);
  const newSide = currentSide === side ? '' : side;
  saveSide(gameId, period, newSide);

  // Update just the buttons in this row instead of re-rendering everything
  const toggle = btn.parentElement;
  toggle.querySelectorAll('.side-btn').forEach(b => {
    b.classList.remove('active-over', 'active-under');
  });
  if (newSide === 'over') btn.classList.add('active-over');
  if (newSide === 'under') btn.classList.add('active-under');

  if (currentTab === 'tracker') {
    refresh();
  } else {
    renderSummary(getAllCachedGames());
  }
}

function onWinnerTeamChange(gameId, team, btn) {
  const wp = getWinnerPick(gameId);
  const newTeam = wp.team === team ? '' : team;
  saveWinnerPick(gameId, 'winner_team', newTeam);
  // Update buttons visually
  const toggle = btn.parentElement;
  toggle.querySelectorAll('.team-pick-btn').forEach(b => b.classList.remove('active'));
  if (newTeam) btn.classList.add('active');
  if (currentTab === 'tracker') refresh();
}

function onWinnerTypeChange(gameId, type, btn) {
  saveWinnerPick(gameId, 'winner_type', type);
  // Refresh to re-render the row (show/hide spread input)
  refresh();
}

function onWinnerSpreadChange(input) {
  const gameId = input.dataset.game;
  const val = input.value === '' ? '' : parseFloat(input.value);
  saveWinnerPick(gameId, 'winner_spread', val);
  if (currentTab === 'tracker') refresh();
}

function toggleTrackerInput(chevron) {
  const card = chevron.closest('.tracker-card');
  const section = card.querySelector('.tracker-ou-section');
  if (!section) return;
  const isOpen = section.style.display !== 'none';
  section.style.display = isOpen ? 'none' : 'block';
  chevron.querySelector('.tracker-chevron-icon').textContent = isOpen ? '▼' : '▲';
}

function adjustDelay(gameId, delta) {
  const current = gameDelays[gameId] || 0;
  const newDelay = Math.max(0, Math.min(120, current + delta));
  gameDelays[gameId] = newDelay;
  // Update just the delay display without full re-render
  const btn = event.target;
  const control = btn.closest('.delay-control');
  if (control) {
    control.querySelector('.delay-value').textContent = newDelay > 0 ? newDelay + 's' : '⏱';
  }
}

function getAllCachedGames() {
  const all = [];
  const seen = new Set();
  Object.values(gamesData).forEach(games => {
    games.forEach(g => {
      if (!seen.has(g.id)) { seen.add(g.id); all.push(g); }
    });
  });
  if (allGamesCache[currentGender]) {
    allGamesCache[currentGender].forEach(g => {
      if (!seen.has(g.id)) { seen.add(g.id); all.push(g); }
    });
  }
  return all;
}

// --- Data Loading ---
async function fetchGamesByFilters() {
  const genders = currentGender === 'both' ? ['mens', 'womens'] : [currentGender];
  let allGames = [];

  if (currentDateMode === 'single') {
    const fetches = genders.map(g => fetchGames(g, currentDate));
    const results = await Promise.all(fetches);
    results.forEach((games, i) => {
      const key = `${genders[i]}_${formatDateParam(currentDate)}`;
      gamesData[key] = games;
      allGames.push(...games.map(g => ({ ...g, gender: genders[i] })));
    });
  } else if (currentDateMode === 'range') {
    const start = new Date(currentDate);
    const end = new Date(endDate);
    if (end < start) { end.setTime(start.getTime()); }
    const dates = [];
    const d = new Date(start);
    while (d <= end) {
      dates.push(new Date(d));
      d.setDate(d.getDate() + 1);
    }
    const fetches = [];
    for (const gender of genders) {
      for (const date of dates) {
        fetches.push(fetchGames(gender, date).then(games => {
          const key = `${gender}_${formatDateParam(date)}`;
          gamesData[key] = games;
          return games.map(g => ({ ...g, gender }));
        }));
      }
    }
    const results = await Promise.all(fetches);
    results.forEach(games => allGames.push(...games));
  } else {
    const fetches = genders.map(g => fetchAllGames(g).then(games => games.map(gm => ({ ...gm, gender: g }))));
    const results = await Promise.all(fetches);
    results.forEach(games => allGames.push(...games));
  }

  const seen = new Set();
  allGames = allGames.filter(g => {
    if (seen.has(g.id)) return false;
    seen.add(g.id);
    return true;
  });
  allGames.sort((a, b) => new Date(a.date) - new Date(b.date));
  return allGames;
}

async function loadCurrentView() {
  if (isFirstLoad) {
    document.getElementById('gamesList').innerHTML = '<div class="loading">Loading games...</div>';
  }

  document.getElementById('dateNav').style.display = currentDateMode !== 'all' ? 'flex' : 'none';
  document.getElementById('dateEndPicker').style.display = currentDateMode === 'range' ? 'inline-flex' : 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('expandAll').style.display = currentTab === 'input' ? '' : 'none';

  const games = await fetchGamesByFilters();

  // Store timestamped snapshots for each game (for delay feature)
  const now = Date.now();
  games.forEach(game => {
    if (!gameDataHistory[game.id]) gameDataHistory[game.id] = [];
    gameDataHistory[game.id].push({ timestamp: now, data: JSON.parse(JSON.stringify(game)) });
    // Keep only last 2 minutes of history
    gameDataHistory[game.id] = gameDataHistory[game.id].filter(s => now - s.timestamp < 120000);
  });

  if (currentTab === 'input') {
    renderGames(games);
    renderSummary(games);
  } else {
    // Apply per-game delays
    const delayedGames = games.map(game => {
      const delay = gameDelays[game.id] || 0;
      if (delay <= 0 || !gameDataHistory[game.id]) return game;
      const targetTime = now - (delay * 1000);
      // Find the snapshot closest to targetTime
      const history = gameDataHistory[game.id];
      let best = history[0];
      for (const snap of history) {
        if (snap.timestamp <= targetTime) best = snap;
      }
      return best ? { ...best.data, gender: game.gender } : game;
    });
    renderTracker(delayedGames);
  }

  // Check for upcoming game notifications
  checkGameNotifications(games);

  isFirstLoad = false;
  updateRefreshInfo();
}

function updateRefreshInfo() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
  document.getElementById('refreshInfo').textContent = `Updated ${timeStr}`;

  const hasLive = Object.values(gamesData).some(games => games.some(g => g.state === 'in')) ||
    Object.values(allGamesCache).some(games => games.some(g => g.state === 'in'));
  document.getElementById('liveDot').style.display = hasLive ? 'inline-block' : 'none';
}

async function refresh() {
  // If user is actively typing in an input, skip this refresh entirely
  const focused = document.activeElement;
  if (focused && focused.classList.contains('ou-input')) {
    return;
  }

  const expandedIds = new Set();
  document.querySelectorAll('.game-card.expanded').forEach(card => {
    expandedIds.add(card.dataset.id);
  });

  // Save expanded tracker O/U sections
  const expandedTrackerOUs = new Set();
  document.querySelectorAll('.tracker-ou-section').forEach(section => {
    if (section.style.display !== 'none') {
      expandedTrackerOUs.add(section.id);
    }
  });

  await loadCurrentView();

  expandedIds.forEach(id => {
    const card = document.querySelector(`.game-card[data-id="${id}"]`);
    if (card) card.classList.add('expanded');
  });

  // Restore expanded tracker O/U sections
  expandedTrackerOUs.forEach(id => {
    const section = document.getElementById(id);
    if (section) {
      section.style.display = 'block';
      const chevron = section.parentElement.querySelector('.tracker-chevron-icon');
      if (chevron) chevron.textContent = '▲';
    }
  });
}

let tickerCount = 0;
let tickerTimer = null;

function renderTicker(count) {
  const ticker = document.getElementById('refreshTicker');
  const pips = Array.from({ length: 5 }, (_, i) =>
    `<span class="ticker-pip ${i < count ? 'active' : ''}"></span>`
  ).join('');
  ticker.innerHTML = `<span class="${count === 0 ? 'ticker-bounce' : ''}">🏀</span><span class="ticker-bar">${pips}</span>`;
}

function startAutoRefresh() {
  if (tickerTimer) clearInterval(tickerTimer);

  tickerCount = 0;
  renderTicker(0);

  tickerTimer = setInterval(() => {
    tickerCount++;
    renderTicker(tickerCount);
    if (tickerCount >= 5) {
      tickerCount = 0;
      refresh().then(() => renderTicker(0));
    }
  }, 1000);
}

// --- Event Listeners ---
document.querySelectorAll('#mainTabs .toggle-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#mainTabs .toggle-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentTab = this.dataset.value;
    localStorage.setItem('mm_tab', currentTab);
    isFirstLoad = true; loadCurrentView();
  });
});

document.querySelectorAll('#genderToggle .toggle-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#genderToggle .toggle-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentGender = this.dataset.value;
    localStorage.setItem('mm_gender', currentGender);
    isFirstLoad = true; loadCurrentView();
  });
});

document.querySelectorAll('#dateMode .toggle-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#dateMode .toggle-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentDateMode = this.dataset.value;
    localStorage.setItem('mm_dateMode', currentDateMode);
    updateDatePickerLabel();
    isFirstLoad = true; loadCurrentView();
  });
});

document.getElementById('endDateInput').addEventListener('change', function() {
  endDate = new Date(this.value + 'T12:00:00');
  localStorage.setItem('mm_endDate', endDate.toISOString());
  updateDatePickerLabel();
  isFirstLoad = true; loadCurrentView();
});

document.getElementById('prevDay').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() - 1);
  localStorage.setItem('mm_date', currentDate.toISOString());
  document.getElementById('dateLabel').textContent = formatDateDisplay(currentDate);
  updateDatePickerLabel();
  isFirstLoad = true; loadCurrentView();
});

document.getElementById('nextDay').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() + 1);
  localStorage.setItem('mm_date', currentDate.toISOString());
  document.getElementById('dateLabel').textContent = formatDateDisplay(currentDate);
  updateDatePickerLabel();
  isFirstLoad = true; loadCurrentView();
});

document.getElementById('expandAll').addEventListener('click', () => {
  allExpanded = !allExpanded;
  document.querySelectorAll('.game-card').forEach(card => {
    if (allExpanded) card.classList.add('expanded');
    else card.classList.remove('expanded');
  });
  document.getElementById('expandAll').textContent = allExpanded ? 'Collapse All' : 'Expand All';
});

</script>
