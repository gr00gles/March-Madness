<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness O/U Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222633;
  --border: #2a2e3d;
  --text: #e4e4e7;
  --text-muted: #8b8d97;
  --accent: #f97316;
  --over: #22c55e;
  --under: #ef4444;
  --push: #eab308;
  --live: #ef4444;
  --input-bg: #13151d;
}

[data-theme="light"] {
  --bg: #f3f4f6;
  --card: #ffffff;
  --card-hover: #f9fafb;
  --border: #d1d5db;
  --text: #111827;
  --text-muted: #6b7280;
  --accent: #ea580c;
  --over: #16a34a;
  --under: #dc2626;
  --push: #ca8a04;
  --live: #dc2626;
  --input-bg: #f9fafb;
}

/* Theme toggle */
.theme-toggle {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Tip button in header */
.btn-tip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 8px;
  border: 1px solid rgba(249,115,22,0.4);
  background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(251,146,60,0.1));
  color: var(--accent);
  cursor: pointer;
  font-size: 0.72rem;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-tip:hover { border-color: var(--accent); background: rgba(249,115,22,0.25); }

/* Collapsible header */
.header-collapse-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0 0 8px 8px;
  padding: 2px 16px;
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--text-muted);
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 101;
  transition: all 0.2s;
  border-top: none;
}
.header-collapse-btn:hover { color: var(--accent); border-color: var(--accent); }

.header {
  position: relative;
}

.header.collapsed .controls {
  display: none;
}
.header.collapsed {
  padding-bottom: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, var(--card) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  transition: padding 0.3s;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header h1 {
  font-size: 1.3rem;
  font-weight: 700;
}

.app-logo {
  font-family: 'Bungee', cursive;
  font-size: 1.2rem;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #22c55e, var(--accent), #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
}

.user-section {
  display: flex;
  align-items: center;
  gap: 8px;
}

.avatar-menu-wrapper {
  position: relative;
}

.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  cursor: pointer;
}

.avatar-menu {
  display: none;
  position: absolute;
  top: 36px;
  right: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 100;
  min-width: 140px;
  text-align: center;
}

.avatar-menu.open { display: block; }

.avatar-menu-name {
  display: block;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  white-space: nowrap;
}

.avatar-menu-btn {
  width: 100%;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.avatar-menu-btn:hover {
  background: rgba(239,68,68,0.1);
  border-color: #ef4444;
  color: #ef4444;
}

.user-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}

.btn-google {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-google:hover { border-color: var(--accent); background: var(--card-hover); }

.btn-google img {
  width: 18px;
  height: 18px;
}

.btn-signout {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.7rem;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-signout:hover { border-color: var(--under); color: var(--under); }

/* Auth overlay */
.auth-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  padding: 40px;
}

.auth-overlay h2 {
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #fb923c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.auth-overlay p {
  color: var(--text-muted);
  margin-bottom: 24px;
  font-size: 0.95rem;
}

.auth-overlay .btn-google {
  font-size: 1rem;
  padding: 12px 28px;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}

.controls-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.date-picker-wrapper {
  position: relative;
}

.date-picker-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

.date-picker-dropdown {
  display: none;
  position: absolute;
  top: 38px;
  left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 100;
  min-width: 240px;
}

.date-picker-dropdown.open { display: flex; flex-direction: column; gap: 10px; }

.date-picker-dropdown .toggle-group { width: 100%; }
.date-picker-dropdown .toggle-btn { flex: 1; text-align: center; }
.date-picker-dropdown .date-nav { justify-content: center; width: 100%; }

.toggle-group {
  display: flex;
  background: var(--input-bg);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.toggle-btn {
  padding: 6px 14px;
  font-size: 0.82rem;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}

.toggle-btn.active {
  background: var(--accent);
  color: #fff;
}

.date-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.date-nav button {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
}

.date-nav button:hover { border-color: var(--accent); }

.date-label {
  font-size: 0.85rem;
  font-weight: 600;
  min-width: 110px;
  text-align: center;
}

.action-btns {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.btn-sm {
  padding: 6px 10px;
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-sm:hover { border-color: var(--accent); color: var(--text); }

.refresh-info {
  font-size: 0.7rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

#refreshTicker {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 0.75rem;
}

.ticker-bounce {
  display: inline-block;
  animation: bounce 0.5s ease;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-4px); }
  60% { transform: translateY(-2px); }
}

.ticker-bar {
  display: inline-flex;
  gap: 2px;
  margin-left: 2px;
}

.ticker-pip {
  width: 4px;
  height: 10px;
  border-radius: 1px;
  background: var(--border);
  transition: background 0.3s, height 0.3s;
}

.ticker-pip.active {
  background: var(--accent);
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--live);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.main { padding: 16px 20px; max-width: 900px; margin: 0 auto; }

/* Summary Dashboard */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.stat-value {
  font-size: 1.4rem;
  font-weight: 700;
}

.stat-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.stat-value.over { color: var(--over); }
.stat-value.under { color: var(--under); }
.stat-value.push { color: var(--push); }

/* Game Cards */
.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.game-card:hover { border-color: #3a3e4d; }

.game-card.live { border-left: 3px solid var(--live); }
.game-card.final { border-left: 3px solid var(--text-muted); }

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.game-header:hover { background: var(--card-hover); }

.game-teams {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.team-logo {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  object-fit: contain;
}

.team-seed {
  font-size: 0.7rem;
  color: var(--text-muted);
  min-width: 16px;
}

.team-name {
  font-size: 0.85rem;
  font-weight: 600;
}

.team-name.winner { color: var(--over); }

.team-score {
  font-size: 0.95rem;
  font-weight: 700;
  margin-left: auto;
  min-width: 28px;
  text-align: right;
}

.game-meta {
  text-align: right;
  min-width: 80px;
}

.game-status {
  font-size: 0.75rem;
  font-weight: 600;
}

.game-status.live { color: var(--live); }
.game-status.halftime { color: #eab308; }
.game-status.pre { color: var(--text-muted); }
.game-status.final { color: var(--text-muted); }

.game-round {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.game-broadcast {
  font-size: 0.65rem;
  color: var(--text-muted);
}

.expand-icon {
  font-size: 0.7rem;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.game-card.expanded .expand-icon { transform: rotate(180deg); }

/* O/U Tracker Table */
.ou-section {
  padding: 12px 14px;
  display: none;
}

.game-card.expanded .ou-section { display: block; }

.ou-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}

.ou-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}

.ou-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}

.ou-table tr:last-child td { border-bottom: none; }

.ou-table .period-label { font-weight: 600; color: var(--text-muted); }

.ou-input {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  width: 70px;
  font-size: 0.82rem;
  text-align: center;
}

.ou-input:focus {
  outline: none;
  border-color: var(--accent);
}

.diff-value {
  font-weight: 700;
  font-size: 0.85rem;
}

.diff-value.over { color: var(--over); }
.diff-value.under { color: var(--under); }
.diff-value.push { color: var(--push); }

.result-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}

.result-badge.over { background: rgba(34,197,94,0.15); color: var(--over); }
.result-badge.under { background: rgba(239,68,68,0.15); color: var(--under); }
.result-badge.push { background: rgba(234,179,8,0.15); color: var(--push); }
.result-badge.pending { background: rgba(139,141,151,0.1); color: var(--text-muted); }

.side-toggle {
  display: flex;
  gap: 2px;
  background: var(--input-bg);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.side-btn {
  padding: 3px 8px;
  font-size: 0.7rem;
  font-weight: 700;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.side-btn:hover { color: var(--text); }
.side-btn.active-over { background: var(--over); color: #fff; }
.side-btn.active-under { background: var(--under); color: #fff; }

.result-badge.win { background: rgba(34,197,94,0.15); color: var(--over); }
.result-badge.loss { background: rgba(239,68,68,0.15); color: var(--under); }

/* Winner row */
tr.winner-separator td {
  border: none;
  padding: 2px 0;
  border-top: 1px dashed var(--border);
}

.team-pick-toggle {
  display: flex;
  background: var(--input-bg);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.team-pick-btn {
  padding: 3px 6px;
  font-size: 0.65rem;
  font-weight: 700;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.team-pick-btn:hover { color: var(--text); }
.team-pick-btn.active { background: var(--accent); color: #fff; }

.winner-input-group {
  display: flex;
  align-items: center;
  gap: 4px;
}

.winner-type-toggle {
  display: flex;
  background: var(--input-bg);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.type-btn {
  padding: 2px 5px;
  font-size: 0.6rem;
  font-weight: 700;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.type-btn:hover { color: var(--text); }
.type-btn.active { background: var(--accent); color: #fff; }

tr.locked-row .team-pick-btn,
tr.locked-row .type-btn {
  cursor: not-allowed;
  opacity: 0.5;
}

/* Spread gap meter */
.spread-meter {
  padding: 4px 0;
}

.spread-meter-track {
  position: relative;
  height: 24px;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  overflow: hidden;
}

.spread-meter-center {
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--text-muted);
  opacity: 0.4;
  z-index: 1;
}

.spread-meter-fill-left {
  position: absolute;
  right: 50%;
  top: 0;
  bottom: 0;
  border-radius: 12px 0 0 12px;
  transition: width 0.5s ease;
}

.spread-meter-fill-right {
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  border-radius: 0 12px 12px 0;
  transition: width 0.5s ease;
}

.spread-meter-ball {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.7rem;
  font-weight: 800;
  color: var(--text);
  z-index: 2;
  white-space: nowrap;
}

.spread-meter-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
}

.spread-meter-label {
  font-size: 0.55rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.spread-meter-label.win { color: var(--over); }
.spread-meter-label.loss { color: var(--under); }

/* Slider flash animation */
@keyframes sliderFlash {
  0% { box-shadow: 0 0 0 0 rgba(249,115,22,0.6); }
  30% { box-shadow: 0 0 12px 4px rgba(249,115,22,0.5); }
  100% { box-shadow: 0 0 0 0 rgba(249,115,22,0); }
}

.slider-track.flash {
  animation: sliderFlash 0.6s ease-out;
}

/* Win crown on slider */
.slider-crown {
  position: absolute;
  top: -41px;
  right: 1px;
  font-size: 38px;
  z-index: 4;
  animation: crownBounce 0.6s ease;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

@keyframes crownBounce {
  0% { transform: scale(0) rotate(-20deg); }
  50% { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* LOSER stamp */
.loser-stamp {
  position: absolute;
  top: 35%;
  right: 132px;
  transform: translateY(-50%) rotate(-18deg);
  font-size: 1.6rem;
  font-weight: 900;
  color: rgba(239, 68, 68, 0.75);
  text-transform: uppercase;
  letter-spacing: 3px;
  z-index: 10;
  pointer-events: none;
  text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
  border: 3px solid rgba(239, 68, 68, 0.5);
  border-radius: 6px;
  padding: 2px 12px;
  animation: stampSlam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  white-space: nowrap;
}

@keyframes stampSlam {
  0% { transform: translateY(-50%) rotate(-18deg) scale(3); opacity: 0; }
  60% { transform: translateY(-50%) rotate(-18deg) scale(0.9); opacity: 1; }
  100% { transform: translateY(-50%) rotate(-18deg) scale(1); opacity: 1; }
}

/* Fireworks */
.fireworks-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
  border-radius: 12px;
}

.tracker-card { position: relative; overflow: hidden; }
.tracker-card > *:not(.fireworks-container):not(.loser-stamp) { position: relative; z-index: 1; }

.firework-particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: fireworkBurst 1s ease-out forwards;
}

@keyframes fireworkBurst {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { opacity: 0; }
}

/* Win glow on card */
.tracker-card.win-card {
  border-color: var(--over);
  box-shadow: 0 0 15px rgba(34,197,94,0.15);
}

.tracker-ou-section {
  border-top: 1px solid var(--border);
  margin-top: 8px;
  padding-top: 8px;
}

/* Compact settled cards */
.tracker-card.settled-card {
  padding: 8px 12px;
  opacity: 0.75;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
}

.tracker-card.settled-card.settled-win {
  border-left-color: var(--over);
  border-right-color: var(--over);
}

.tracker-card.settled-card.settled-loss {
  border-left-color: var(--under);
  border-right-color: var(--under);
  border-color: var(--under);
  box-shadow: 0 0 15px rgba(239,68,68,0.15);
}

.tracker-card.settled-card.settled-push {
  border-left-color: var(--push);
  border-right-color: var(--push);
}

.settled-compact {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.settled-period-vert {
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.2;
  text-align: center;
}

.settled-team-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.settled-logo {
  width: 22px;
  height: 22px;
  object-fit: contain;
}

.settled-abbr {
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.settled-score {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text);
}

.tracker-card.settled-card .tracker-chevron {
  padding: 0;
}

.tracker-card.settled-card .tracker-ou-section {
  margin-top: 6px;
  padding-top: 6px;
}

.tracker-chevron {
  display: flex;
  justify-content: center;
  cursor: pointer;
  padding: 2px 0 0;
  line-height: 1;
}

.tracker-chevron-icon {
  font-size: 0.6rem;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.tracker-chevron:hover .tracker-chevron-icon {
  color: var(--accent);
}

/* Bet Tracker View */
.tracker-layout {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.tracker-side-counter {
  position: sticky;
  top: 140px;
  min-width: 70px;
  text-align: center;
  padding: 16px 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.tracker-side-counter .counter-num {
  font-size: 2.5rem;
  font-weight: 900;
  line-height: 1;
}

.tracker-side-counter .counter-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
  color: var(--text-muted);
}

.tracker-side-counter.wins .counter-num { color: var(--over); }
.tracker-side-counter.wins { border-color: rgba(34,197,94,0.2); }
.tracker-side-counter.losses .counter-num { color: var(--under); }
.tracker-side-counter.losses { border-color: rgba(239,68,68,0.2); }

.tracker-cards-center {
  flex: 1;
  min-width: 0;
}

@media (max-width: 600px) {
  .tracker-side-counter { min-width: 50px; padding: 10px 4px; }
  .tracker-side-counter .counter-num { font-size: 1.8rem; }
  .tracker-side-counter .counter-label { font-size: 0.55rem; }
  .tracker-layout { gap: 8px; }
}

.tracker-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  padding: 14px 16px;
  transition: border-color 0.2s;
}

.tracker-card.is-live { border-color: rgba(255,255,255,0.3); }
.tracker-card-dim { opacity: 0.35; }

/* Delay control */
.delay-control {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1px 2px;
}

.delay-btn {
  width: 20px;
  height: 20px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all 0.15s;
}

.delay-btn:hover { background: var(--border); color: var(--text); }

.delay-value {
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 22px;
  text-align: center;
}

/* Status row */
.tracker-status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.tracker-status-left {
  display: flex;
  align-items: center;
  gap: 6px;
}

.tracker-period-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tracker-status {
  font-size: 0.7rem;
  font-weight: 700;
}

.tracker-status.live { color: var(--live); }
.tracker-status.halftime { color: #eab308; }
.tracker-status.final { color: var(--text-muted); }
.tracker-status.pre { color: var(--text-muted); }

.tracker-token {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.tracker-token.win { background: rgba(34,197,94,0.2); color: var(--over); }
.tracker-token.loss { background: rgba(239,68,68,0.2); color: var(--under); }
.tracker-token.push { background: rgba(234,179,8,0.2); color: var(--push); }
.tracker-token.live { background: rgba(239,68,68,0.15); color: var(--live); }
.tracker-token.pending { background: rgba(139,141,151,0.1); color: var(--text-muted); }

/* Main layout: team | bar | team */
.tracker-bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.tracker-team-side {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 50px;
}

.tracker-team-side img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: contain;
}

.tracker-team-side .t-name {
  font-size: 0.72rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.1;
}

.tracker-team-side .t-score {
  font-size: 1.1rem;
  font-weight: 800;
}

/* Center bar section */
.tracker-bar-center {
  flex: 1;
  min-width: 0;
}

.tracker-bet-line {
  text-align: center;
  margin-bottom: 6px;
}

.tracker-bet-tag {
  font-size: 1rem;
  font-weight: 800;
  padding: 4px 16px;
  border-radius: 6px;
  display: inline-block;
  letter-spacing: 0.5px;
}

.tracker-bet-tag.over, .tracker-bet-tag.under, .tracker-bet-tag.winner { background: rgba(255,255,255,0.08); color: var(--text); }
.tracker-bet-tag.over.won, .tracker-bet-tag.under.won, .tracker-bet-tag.winner.won { background: rgba(34,197,94,0.2); color: var(--over); }
.tracker-bet-tag.over.lost, .tracker-bet-tag.under.lost, .tracker-bet-tag.winner.lost { background: rgba(239,68,68,0.2); color: var(--under); }


/* The slider bar */
.slider-track {
  position: relative;
  height: 36px;
  background: var(--input-bg);
  border-radius: 18px;
  overflow: visible;
  border: 1px solid var(--border);
}

.slider-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  border-radius: 15px 0 0 15px;
  transition: width 0.4s ease, background 0.3s;
  min-width: 0;
}

.slider-fill.under-line { background: linear-gradient(90deg, #1a1d27, rgba(255,255,255,0.12)); }
.slider-fill.at-line { background: var(--push); border-radius: 15px; }
.slider-fill.over-line-win { background: linear-gradient(90deg, #22c55e30, #22c55e); border-radius: 15px; }
.slider-fill.over-line-loss { background: linear-gradient(90deg, #ef444430, #ef4444); border-radius: 15px; }
.slider-fill.over-line-neutral { background: linear-gradient(90deg, #1a1d27, rgba(255,255,255,0.15)); border-radius: 15px; }

.slider-ball {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 52px;
  z-index: 2;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.9));
  transition: left 0.4s ease;
}

.slider-ball.ball-over {
  right: -8px;
  left: auto !important;
  transform: translate(0, -50%);
}

.slider-score-inside {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.1rem;
  font-weight: 900;
  color: #fff;
  z-index: 3;
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  transition: left 0.4s ease;
}

.slider-score-inside.score-over {
  right: 8px;
  left: auto !important;
  transform: translate(0, -50%);
}

.slider-line-marker {
  position: absolute;
  top: -3px;
  bottom: -3px;
  width: 2px;
  background: var(--text);
  transform: translateX(-50%);
  z-index: 1;
  border-radius: 1px;
}

/* Bottom info under bar */
.tracker-bar-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2px;
  padding: 0 2px;
}

.tracker-bar-score {
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 20px;
}

.tracker-bar-diff {
  font-size: 1.1rem;
  font-weight: 800;
}

.tracker-bar-line-num {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.tracker-no-bet-card {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
  padding: 8px 0;
}

.tracker-gender-badge {
  font-size: 0.55rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
}

@media (max-width: 600px) {
  .tracker-team-side img { width: 28px; height: 28px; }
  .tracker-team-side .t-name { font-size: 0.65rem; }
  .tracker-team-side .t-score { font-size: 0.9rem; }
  .tracker-bar-row { gap: 8px; }
  .tracker-card { padding: 10px 12px; }
}

.sync-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sync-badge.connected { background: rgba(34,197,94,0.15); color: var(--over); }
.sync-badge.local { background: rgba(139,141,151,0.1); color: var(--text-muted); }

.tracker-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.tracker-controls .date-input {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 0.82rem;
}

.tracker-controls .date-input:focus {
  outline: none;
  border-color: var(--accent);
}

.tracker-date-label {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.vegas-hint {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 6px;
}

.no-games {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.no-games h3 { margin-bottom: 8px; color: var(--text); }

.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  display: none;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

.modal h3 { margin-bottom: 12px; }

.modal textarea {
  width: 100%;
  height: 200px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 10px;
  font-size: 0.8rem;
  font-family: monospace;
  resize: vertical;
}

.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: flex-end;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* All Games view */
.view-toggle { margin-bottom: 16px; }

/* Responsive */
@media (max-width: 600px) {
  .header-top { flex-direction: column; align-items: flex-start; }
  .controls-row { flex-wrap: wrap; }
  .action-btns { margin-left: 0; width: 100%; justify-content: flex-start; }
  .summary { grid-template-columns: repeat(2, 1fr); }
  .ou-input { width: 60px; }
  .date-label { min-width: auto; }
}

/* Tip flag */
.tip-flag {
  position: fixed;
  right: 0;
  top: 50%;
  transform: translateX(100%) translateY(-50%);
  z-index: 999;
  background: linear-gradient(135deg, #1a0a00 0%, #2d1000 30%, #1a0a00 60%, #2d1000 100%);
  border: 3px solid #f97316;
  border-right: none;
  border-radius: 20px 0 0 20px;
  padding: 24px 22px 28px 20px;
  text-align: center;
  width: 140px;
  box-shadow: -8px 0 40px rgba(249,115,22,0.5), inset 0 0 30px rgba(249,115,22,0.1), 0 0 60px rgba(234,179,8,0.2);
  overflow: visible;
  transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.tip-flag.visible {
  transform: translateX(0) translateY(-50%);
}
.tip-flag::before {
  content: '🔥🔥🔥';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.2rem;
  animation: flameWave 0.4s ease-in-out infinite alternate;
  filter: blur(0.3px);
  letter-spacing: -4px;
}
.tip-flag::after {
  content: '🔥🔥';
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.6rem;
  animation: flameWave 0.35s 0.15s ease-in-out infinite alternate;
  filter: blur(0.3px);
  letter-spacing: -2px;
}
@keyframes flameWave {
  from { transform: translateX(-50%) translateY(0) scaleX(1); }
  to { transform: translateX(-50%) translateY(-8px) scaleX(0.85); }
}
@keyframes flagPulse {
  0%, 100% { box-shadow: -8px 0 40px rgba(249,115,22,0.5), inset 0 0 30px rgba(249,115,22,0.1), 0 0 60px rgba(234,179,8,0.2); border-color: #f97316; }
  50% { box-shadow: -8px 0 60px rgba(249,115,22,0.7), inset 0 0 40px rgba(249,115,22,0.15), 0 0 80px rgba(234,179,8,0.4); border-color: #eab308; }
}
@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-8deg); }
  75% { transform: rotate(8deg); }
}
@keyframes textFlicker {
  0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(249,115,22,0.8), 0 0 20px rgba(234,179,8,0.4); }
  50% { opacity: 0.9; text-shadow: 0 0 20px rgba(249,115,22,1), 0 0 40px rgba(234,179,8,0.7), 0 0 60px rgba(239,68,68,0.3); }
}
.tip-flag.pulsing {
  animation: flagPulse 1.5s ease-in-out infinite;
}
.tip-flag.dismissing {
  transform: translateX(110%) translateY(-50%) !important;
  transition: transform 0.3s ease !important;
}
.tip-flag .tip-flames-top {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.8rem;
  animation: flameWave 0.5s 0.1s ease-in-out infinite alternate;
  letter-spacing: -3px;
}
.tip-flag .tip-emoji {
  font-size: 3rem;
  line-height: 1;
  position: relative;
  z-index: 1;
  animation: wobble 1s ease-in-out infinite;
}
.tip-flag .tip-label {
  font-size: 1.1rem;
  font-weight: 900;
  background: linear-gradient(180deg, #fff, #f97316, #eab308);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 8px 0;
  line-height: 1.2;
  position: relative;
  z-index: 1;
  animation: textFlicker 2s ease-in-out infinite;
}
.tip-flag .tip-btn {
  display: block;
  background: linear-gradient(135deg, #f97316, #eab308, #f97316);
  background-size: 200% 200%;
  animation: shimmerBtn 2s ease infinite;
  color: #000;
  font-weight: 900;
  font-size: 1rem;
  padding: 10px 14px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.3);
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}
@keyframes shimmerBtn {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.tip-flag .tip-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 24px rgba(249,115,22,0.7);
}
.tip-flag .tip-x {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
  padding: 4px;
  z-index: 2;
}
.tip-flag .tip-x:hover { color: #fff; }

/* Game notification - slides from left */
.game-notify {
  position: fixed;
  left: 0;
  top: 50%;
  transform: translateX(-100%) translateY(-50%);
  z-index: 998;
  background: var(--card);
  border: 2px solid #eab308;
  border-left: none;
  border-radius: 0 14px 14px 0;
  padding: 14px 16px 14px 12px;
  width: 260px;
  box-shadow: 8px 0 30px rgba(234,179,8,0.3);
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.game-notify.visible {
  transform: translateX(0) translateY(-50%);
}
.game-notify.peeking {
  transform: translateX(-232px) translateY(-50%);
  cursor: pointer;
}
.game-notify.peeking:hover {
  transform: translateX(-224px) translateY(-50%);
}
.game-notify.dismissing {
  transform: translateX(-110%) translateY(-50%) !important;
  transition: transform 0.3s ease !important;
}
.game-notify-x {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 0.8rem;
  color: var(--text-muted);
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.game-notify-x:hover { color: var(--text); }
.game-notify-peek-tab {
  position: absolute;
  right: -2px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2rem;
  pointer-events: none;
}
.game-notify-icon { font-size: 1.4rem; margin-bottom: 4px; }
.game-notify-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: #eab308;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.game-notify-body {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.game-notify-warn {
  font-size: 0.68rem;
  color: #f97316;
  font-weight: 700;
  margin-top: 6px;
  animation: pulse 1.5s infinite;
}
.game-notify-inputs {
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}
.game-notify-inputs .ou-table { font-size: 0.7rem; }
.game-notify-inputs .ou-input { width: 55px; font-size: 0.7rem; padding: 3px 4px; }
.game-notify-inputs .side-btn { padding: 2px 6px; font-size: 0.65rem; }

/* Locked row - period is complete */
tr.locked-row td {
  opacity: 0.5;
}
tr.locked-row .ou-input {
  background: var(--border);
  cursor: not-allowed;
}
tr.locked-row .side-btn {
  cursor: not-allowed;
  opacity: 0.5;
}

/* Needs-bet highlight on input table rows */
tr.needs-bet td {
  background: rgba(234,179,8,0.08);
}
tr.needs-bet td:first-child {
  border-left: 3px solid #eab308;
  animation: needsBetPulse 2s ease-in-out infinite;
}
@keyframes needsBetPulse {
  0%, 100% { border-left-color: #eab308; }
  50% { border-left-color: rgba(234,179,8,0.3); }
}

/* Nervous card - score close to line */
.tracker-card.nervous {
  animation: nervousShake 0.8s ease-in-out infinite;
  border-color: rgba(234,179,8,0.5);
}

.tracker-card.very-nervous {
  animation: veryNervousShake 0.3s ease-in-out infinite;
  border-color: rgba(239,68,68,0.5);
  box-shadow: 0 0 12px rgba(239,68,68,0.15);
}

@keyframes nervousShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-1px); }

}

<script>
// --- Firebase Config ---
const firebaseConfig = {

  measurementId: "G-F0K8ZMF558"

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- State ---
let currentTab = localStorage.getItem('mm_tab') || 'input';
let currentGender = localStorage.getItem('mm_gender') || 'mens';
let currentDateMode = localStorage.getItem('mm_dateMode') || 'single';
let currentDate = localStorage.getItem('mm_date') ? new Date(localStorage.getItem('mm_date')) : new Date();
let endDate = localStorage.getItem('mm_endDate') ? new Date(localStorage.getItem('mm_endDate')) : new Date();
let gamesData = {};
let allExpanded = false;
let allGamesCache = {};
let currentUser = null;
let picksCache = {};
let firebaseListener = null;
let isFirstLoad = true;
let localChangeInProgress = false;
let prevScores = {};
let winTimestamps = JSON.parse(localStorage.getItem('mm_winTimestamps') || '{}');
let gameDelays = {}; // Per-game delay in seconds { gameId: 45 }
let gameDataHistory = {}; // { gameId: [{timestamp, data}, ...] } for delayed playback

const TOURNAMENT_START = new Date('2026-03-17');
const TOURNAMENT_END = new Date('2026-04-07');
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball';

// --- Auth ---
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';

    document.getElementById('dateLabel').textContent = formatDateDisplay(currentDate);
    document.getElementById('endDateInput').value = endDate.toISOString().split('T')[0];

    // Migrate any local picks to Firebase

  } else {

      firebaseListener();

});

document.getElementById('signInBtn').addEventListener('click', () => {

});

// Theme toggle
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('mm_theme') || 'dark';

// Header collapse

collapseBtn.addEventListener('click', () => {

  collapseBtn.textContent = isCollapsed ? '▼ Expand' : '▲ Minimize';
  localStorage.setItem('mm_header_collapsed', isCollapsed);
});

function migrateLocalPicks() {
  if (!currentUser) return;
  // Check if there are any old localStorage picks to migrate
  const oldKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('mm_picks_')) {
      oldKeys.push(key);
    }
  }
  if (oldKeys.length === 0) return;

  // Only migrate if Firebase has no data yet
  db.ref('picks/' + currentUser.uid).once('value', (snapshot) => {
    if (snapshot.val()) return; // Already has data, skip

    // Merge all local picks
    let merged = {};
    oldKeys.forEach(key => {
      try {
        const local = JSON.parse(localStorage.getItem(key) || '{}');
        Object.entries(local).forEach(([gameId, periods]) => {
          if (!merged[gameId]) merged[gameId] = {};
          Object.assign(merged[gameId], periods);
        });
      } catch(e) {}
    });

    if (Object.keys(merged).length > 0) {
      db.ref('picks/' + currentUser.uid).set(merged);
    }
  });
}

// --- Firebase Data Layer ---
function setupFirebaseListener() {
  if (!currentUser) return;

  // Remove old listener
  if (firebaseListener) {
    firebaseListener();
    firebaseListener = null;
  }

  const ref = db.ref('picks/' + currentUser.uid);
  const callback = ref.on('value', (snapshot) => {
    picksCache = snapshot.val() || {};
    if (!isFirstLoad && !localChangeInProgress) {
      refresh();
    }
  });

  // Store unsubscribe function
  firebaseListener = () => ref.off('value', callback);
}

function loadPicks() {
  return picksCache;
}

function savePicks(picks) {
  if (!currentUser) return;
  localChangeInProgress = true;
  picksCache = picks;
  db.ref('picks/' + currentUser.uid).set(picks).then(() => {
    localChangeInProgress = false;
  });
}

function savePick(gameId, period, value) {
  const picks = loadPicks();
  if (!picks[gameId]) picks[gameId] = {};
  if (value === '' || value === null) {
    delete picks[gameId][period];
  } else {
    picks[gameId][period] = parseFloat(value);
  }
  savePicks(picks);
}

function saveSide(gameId, period, side) {
  const picks = loadPicks();
  if (!picks[gameId]) picks[gameId] = {};
  const sideKey = period + '_side';
  if (!side) {
    delete picks[gameId][sideKey];
  } else {
    picks[gameId][sideKey] = side;
  }
  savePicks(picks);
}

function getPick(gameId, period) {
  return picksCache[gameId]?.[period] ?? '';
}

function getSide(gameId, period) {
  return picksCache[gameId]?.[period + '_side'] ?? '';
}

// --- Winner Bet Functions ---
function saveWinnerPick(gameId, field, value) {
  const picks = loadPicks();
  if (!picks[gameId]) picks[gameId] = {};
  if (value === '' || value === null || value === undefined) {
    delete picks[gameId][field];
  } else {
    picks[gameId][field] = value;
  }
  savePicks(picks);
}

function getWinnerPick(gameId) {
  const data = picksCache[gameId] || {};
  return {
    team: data.winner_team || '',
    type: data.winner_type || 'spread',
    spread: data.winner_spread ?? '',
  };
}

function hasWinnerBet(gameId) {
  const wp = getWinnerPick(gameId);
  return wp.team !== '' && (wp.type === 'ml' || (wp.type === 'spread' && wp.spread !== '' && wp.spread !== null));
}

function calcWinnerResult(game, pick) {
  if (!pick.team) return { diff: null, result: null };
  const isFinal = game.state === 'post';
  const isLive = game.state === 'in';
  if (!isFinal && !isLive) return { diff: null, result: 'pending' };

  const pickedSide = pick.team; // 'away' or 'home'
  const otherSide = pickedSide === 'away' ? 'home' : 'away';
  const pickedScore = game[pickedSide].score;
  const otherScore = game[otherSide].score;

  if (pick.type === 'ml') {
    // Moneyline: just who's winning/won
    const diff = pickedScore - otherScore;
    if (!isFinal) {
      if (diff > 0) return { diff, result: 'pacing-win' };
      if (diff < 0) return { diff, result: 'pacing-loss' };
      return { diff: 0, result: 'pacing-push' };
    }
    if (diff > 0) return { diff, result: 'win' };
    if (diff < 0) return { diff, result: 'loss' };
    return { diff: 0, result: 'push' };
  }

  // Spread: picked team score + spread vs opponent
  const spread = parseFloat(pick.spread) || 0;
  const adjustedDiff = (pickedScore + spread) - otherScore;
  if (!isFinal) {
    if (adjustedDiff > 0) return { diff: adjustedDiff, result: 'pacing-win' };
    if (adjustedDiff < 0) return { diff: adjustedDiff, result: 'pacing-loss' };
    return { diff: 0, result: 'pacing-push' };
  }
  if (adjustedDiff > 0) return { diff: adjustedDiff, result: 'win' };
  if (adjustedDiff < 0) return { diff: adjustedDiff, result: 'loss' };
  return { diff: 0, result: 'push' };
}

// --- ESPN API ---
function formatDateParam(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}${m}${d}`;
}

function formatDateDisplay(date) {
  return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

async function fetchGames(gender, date) {
  const sport = gender === 'mens' ? 'mens-college-basketball' : 'womens-college-basketball';
  const dateStr = formatDateParam(date);
  const url = `${ESPN_BASE}/${sport}/scoreboard?groups=100&dates=${dateStr}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) return [];
    const data = await resp.json();
    return (data.events || []).map(parseEvent);
  } catch (e) {
    console.error('Failed to fetch games:', e);
    return [];
  }
}

async function fetchAllGames(gender) {
  const sport = gender === 'mens' ? 'mens-college-basketball' : 'womens-college-basketball';
  const dates = [];
  const d = new Date(TOURNAMENT_START);
  while (d <= TOURNAMENT_END) {
    dates.push(formatDateParam(new Date(d)));
    d.setDate(d.getDate() + 1);
  }

  const allGames = [];
  for (let i = 0; i < dates.length; i += 5) {
    const batch = dates.slice(i, i + 5);
    const results = await Promise.all(
      batch.map(async dateStr => {
        const url = `${ESPN_BASE}/${sport}/scoreboard?groups=100&dates=${dateStr}`;
        try {
          const resp = await fetch(url);
          if (!resp.ok) return [];
          const data = await resp.json();
          return (data.events || []).map(parseEvent);
        } catch { return []; }
      })
    );
    results.forEach(games => allGames.push(...games));
  }

  const seen = new Set();
  const unique = [];
  for (const game of allGames) {
    if (!seen.has(game.id)) {
      seen.add(game.id);
      unique.push(game);
    }
  }

  unique.sort((a, b) => new Date(a.date) - new Date(b.date));
  allGamesCache[gender] = unique;
  return unique;
}

function parseEvent(event) {
  const comp = event.competitions?.[0] || {};
  const status = comp.status || {};
  const teams = (comp.competitors || []).map(c => ({
    id: c.id,
    name: c.team?.shortDisplayName || c.team?.displayName || 'TBD',
    abbreviation: c.team?.abbreviation || '',
    logo: c.team?.logo || '',
    score: parseInt(c.score) || 0,
    homeAway: c.homeAway,
    winner: c.winner,
    seed: c.curatedRank?.current || null,
    linescores: (c.linescores || []).map(ls => ls.value || 0),
    color: c.team?.color ? `#${c.team.color}` : null,
  }));

  const away = teams.find(t => t.homeAway === 'away') || teams[0] || {};
  const home = teams.find(t => t.homeAway === 'home') || teams[1] || {};

  const odds = comp.odds?.[0] || {};
  const notes = comp.notes?.[0]?.headline || '';
  const broadcasts = (comp.broadcasts || []).flatMap(b => b.names || []);

  let round = '';
  if (notes.includes('1st Round')) round = 'Round of 64';
  else if (notes.includes('2nd Round')) round = 'Round of 32';
  else if (notes.includes('Sweet 16') || notes.includes('Regional Semifinal')) round = 'Sweet 16';
  else if (notes.includes('Elite 8') || notes.includes('Elite Eight') || notes.includes('Regional Final')) round = 'Elite 8';
  else if (notes.includes('Final Four') || notes.includes('National Semifinal')) round = 'Final Four';
  else if (notes.includes('Championship') || notes.includes('National Championship')) round = 'Championship';
  else if (notes) round = notes.split(' - ').pop()?.trim() || '';

  let region = '';
  const regionMatch = notes.match(/(East|West|South|Midwest|Greensboro|Albany|Portland|Dallas)/i);
  if (regionMatch) region = regionMatch[1];

  return {
    id: event.id,
    date: event.date,
    name: event.shortName || event.name,
    away, home,
    state: status.type?.state || 'pre',
    statusText: getStatusText(status),
    period: status.period || 0,
    clock: status.displayClock || '',
    vegasOU: odds.overUnder || null,
    spread: odds.details || '',
    round, region,
    broadcast: broadcasts.join(', '),
    venue: comp.venue?.fullName || '',
  };
}

function getStatusText(status) {
  const state = status.type?.state;
  if (state === 'post') return 'Final';
  if (state === 'in') {
    const period = status.period || 1;
    const clock = status.displayClock || '';
    if (period === 1 && (clock === '0:00' || clock === '0.0')) return 'Halftime';
    if (period === 2 && clock === '20:00') return 'Halftime';
    const half = period <= 2 ? `${period}H` : `OT${period - 2}`;
    return `${half} ${clock}`;
  }
  const d = new Date(status.type?.detail || '');
  if (!isNaN(d)) {
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }
  return status.type?.shortDetail || 'TBD';
}

// --- Calculations ---
function calcHalfScore(game, half) {
  if (half === '1h') {
    return (game.away.linescores[0] || 0) + (game.home.linescores[0] || 0);
  }
  if (half === '2h') {
    // 2H bet is always total game score
    return game.away.score + game.home.score;
  }
  if (half === 'full') {
    return game.away.score + game.home.score;
  }
  return 0;
}

function getFirstHalfScore(game) {
  return (game.away.linescores[0] || 0) + (game.home.linescores[0] || 0);
}

function isHalfComplete(game, half) {
  if (game.state === 'post') return true;
  if (game.state === 'pre') return false;
  if (half === '1h') return game.period >= 2;
  if (half === '2h') return game.state === 'post';
  if (half === 'full') return game.state === 'post';
  return false;
}

function isHalfInProgress(game, half) {
  if (game.state !== 'in') return false;
  if (half === '1h') return game.period === 1;
  if (half === '2h') return game.period >= 2;
  if (half === 'full') return true;
  return false;
}

function getResult(line, actual, complete, inProgress) {
  if (line === '' || line === null || line === undefined) return { diff: null, result: null };
  const diff = actual - line;
  if (!complete && !inProgress) return { diff: null, result: 'pending' };
  if (!complete && inProgress) {
    return { diff, result: diff > 0 ? 'pacing-over' : diff < 0 ? 'pacing-under' : 'pacing-push' };
  }
  if (diff > 0) return { diff, result: 'over' };
  if (diff < 0) return { diff, result: 'under' };
  return { diff: 0, result: 'push' };
}

// --- Rendering ---
function renderSummary(games) {
  let wins = 0, losses = 0, pushes = 0, total = 0;
  const byPeriod = { '1h': { w: 0, l: 0, p: 0 }, '2h': { w: 0, l: 0, p: 0 }, 'full': { w: 0, l: 0, p: 0 } };

  games.forEach(game => {
    ['1h', '2h', 'full'].forEach(period => {
      const line = getPick(game.id, period);
      const side = getSide(game.id, period);
      if (line === '' || line === null || line === undefined) return;
      if (!side) return;
      const actual = calcHalfScore(game, period);
      const complete = isHalfComplete(game, period);
      if (!complete) return;
      const { result } = getResult(line, actual, complete, false);
      total++;
      if (result === 'push') { pushes++; byPeriod[period].p++; }
      else if (result === side) { wins++; byPeriod[period].w++; }
      else { losses++; byPeriod[period].l++; }
    });
  });

  document.getElementById('summary').innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Settled Bets</div></div>
    <div class="stat-card"><div class="stat-value over">${wins}</div><div class="stat-label">Wins</div></div>
    <div class="stat-card"><div class="stat-value under">${losses}</div><div class="stat-label">Losses</div></div>
    <div class="stat-card"><div class="stat-value push">${pushes}</div><div class="stat-label">Pushes</div></div>
    <div class="stat-card"><div class="stat-value">${byPeriod['1h'].w}-${byPeriod['1h'].l}-${byPeriod['1h'].p}</div><div class="stat-label">1H Record</div></div>
    <div class="stat-card"><div class="stat-value">${byPeriod['2h'].w}-${byPeriod['2h'].l}-${byPeriod['2h'].p}</div><div class="stat-label">2H Record</div></div>
    <div class="stat-card"><div class="stat-value">${byPeriod['full'].w}-${byPeriod['full'].l}-${byPeriod['full'].p}</div><div class="stat-label">Full Record</div></div>
  `;
}
